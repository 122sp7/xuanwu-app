name: Copilot Setup Steps (Stable Node 24)

on:
  workflow_dispatch:

jobs:
  copilot-setup:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_AUDIT: "false"

    steps:
      # 1️⃣ Install system Git & Checkout
      - name: Git & Checkout
        run: |
          sudo apt-get update
          sudo apt-get install -y git
          git --version
          git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Checkout Repository
        uses: actions/checkout@v6

      # 2️⃣ Setup Node.js 24.x (actions/setup-node + cache)
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "npm"

      # 3️⃣ Install Node & Python dependencies + global tools + MCP warm-up
      - name: Full Environment Setup
        run: |
          # Node dependencies
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --no-audit --progress=false
          else
            npm install --prefer-offline --no-audit --progress=false
          fi

          # Python setup
          sudo apt-get install -y python3.11 python3.11-venv python3-pip
          python3 --version
          pip3 install --upgrade pip
          pip3 install -r lib/firebase/functions-python/requirements-dev.txt

          # Node global tools
          npm install -g typescript eslint
          npx typescript --version
          npx eslint --version

          # MCP servers warm-up
          npx @modelcontextprotocol/server-filesystem --version || true
          npx @modelcontextprotocol/server-git --version || true
          npx @modelcontextprotocol/server-memory --version || true
          npx repomix --version || true
          npx firebase-tools --version || true
          npx next-devtools-mcp --version || true
          npx shadcn --version || true
          uvx markitdown-mcp --version || true
          uvx serena --from git+https://github.com/oraios/serena serena start-mcp-server --version || true

          # Verify environment
          git --version
          node -v
          npm -v
          python3 --version
          pip3 --version

      # 4️⃣ Done
      - name: Setup Complete
        run: echo "✅ Copilot environment is ready!"