name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-22.04

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: "20.20.1"
          cache: "npm"

      - name: Install Node.js dependencies
        working-directory: .
        run: |
          # 根治方案：先刪除 node_modules 與 lock file，保證乾淨安裝
          rm -rf node_modules package-lock.json
          npm install

      - name: Install Firebase Functions dependencies
        working-directory: lib/firebase/functions
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Install uv (required by Serena, markitdown, and agent-memory MCP servers)
        uses: astral-sh/setup-uv@v5.3.0
        with:
          enable-cache: true