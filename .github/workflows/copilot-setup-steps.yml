name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

concurrency:
  group: copilot-setup-steps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Node.js dependencies
        env:
          NPM_CONFIG_AUDIT: "false"
          NPM_CONFIG_FUND: "false"
        run: |
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --no-audit --progress=false
          else
            npm install --prefer-offline --no-audit --progress=false
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            lib/firebase/functions-python/requirements.txt
            lib/firebase/functions-python/requirements-dev.txt

      - name: Install Python dependencies
        working-directory: lib/firebase/functions-python
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Verify coding-agent toolchain
        run: |
          node -v
          npm -v
          npx -v
          python --version
          uv --version
          uvx --from git+https://github.com/oraios/serena serena start-mcp-server --help
          npx -y @modelcontextprotocol/server-sequential-thinking --help
          echo "Expected GitHub Copilot coding-agent MCP servers: filesystem, memory, repomix, next-devtools, shadcn, serena, sequential-thinking"

      - name: Validate Serena MCP template
        run: |
          node <<'EOF'
          const fs = require("node:fs");
          const config = JSON.parse(fs.readFileSync(".github/copilot/serena-coding-agent-mcp.json", "utf8"));
          if (!config?.mcpServers?.["sequential-thinking"]) {
            throw new Error("Missing sequential-thinking MCP server configuration.");
          }
          const tools = new Set(config?.mcpServers?.serena?.tools ?? []);
          const required = [
            "activate_project",
            "find_symbol",
            "find_referencing_symbols",
            "find_referencing_code_snippets",
            "get_symbols_overview",
            "search_for_pattern",
            "list_memories",
            "read_memory",
            "write_memory",
            "prepare_for_new_conversation",
          ];
          const missing = required.filter((tool) => !tools.has(tool));
          if (missing.length > 0) {
            throw new Error(`Missing Serena MCP tools: ${missing.join(", ")}`);
          }
          EOF

      - name: Validate Copilot customization baseline
        run: |
          test -f .github/copilot-instructions.md
          test -d .github/copilot
          test -d .github/instructions
          test -d .github/agents
          test -d .github/prompts
          test -d .github/skills
          test -f .github/hooks/guardrails.json
          test -f .github/README.md
          test -f .github/copilot/serena-coding-agent-mcp.json
          test -f .github/copilot/serena-browser-setup.md
          test -f .serena/project.yml
          test -d .serena/memories
          test -f .serena/memories/INDEX.md
          echo "Customization inventory check passed."
