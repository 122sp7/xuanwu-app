name: Copilot Setup Steps (Stable Node 24)

on:
  workflow_dispatch:

jobs:
  copilot-setup:
    runs-on: ubuntu-22.04

    permissions:
      contents: read

    env:
      # 避免 GitHub API rate limit
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # npm 降低網路請求與 audit
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_AUDIT: "false"

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout
        uses: actions/checkout@v6

      # 2️⃣ Node.js 24.x setup
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "npm"

      # 3️⃣ Install Node.js dependencies (穩健用 npm ci 或 fallback npm install)
      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --no-audit --progress=false
          else
            npm install --prefer-offline --no-audit --progress=false
          fi

      # 4️⃣ Python setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            lib/firebase/functions-python/requirements.txt
            lib/firebase/functions-python/requirements-dev.txt

      # 5️⃣ Install Python dependencies
      - name: Install Python dependencies
        working-directory: lib/firebase/functions-python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # 6️⃣ MCP servers dependencies (uv for Serena, markitdown, agent-memory)
      - name: Install uv (MCP servers)
        uses: astral-sh/setup-uv@v5.3.0
        with:
          enable-cache: false

      # 7️⃣ Preload common tools (Lint / TypeScript)
      - name: Preload Node tools
        run: |
          npx --yes typescript --version || true
          npx --yes eslint --version || true

      # 8️⃣ Verify Node and Python
      - name: Verify setup
        run: |
          node -v
          npm -v
          python --version
          pip --version

      # 9️⃣ Done marker
      - name: Setup complete
        run: echo "✅ Copilot environment is ready!"