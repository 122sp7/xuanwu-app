name: Copilot Setup Steps (Stable)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-22.04

    permissions:
      contents: read

    env:
      # ✅ 避免 rate limit
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # ✅ npm 降低噪音與請求
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_AUDIT: "false"

    steps:
      # ✅ 1. Checkout（穩定版本）
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 2. Node（LTS + cache）
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      # ✅ 3. 安裝 Node（關鍵：用 npm ci）
      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --no-audit --progress=false
          else
            npm install --prefer-offline --no-audit --progress=false
          fi

      # ✅ 4. Python（cache + 穩定）
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ✅ 5. Python dependencies（避免爆網路）
      - name: Install Python deps
        run: |
          cd lib/firebase/functions-python
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # ✅ 6. uv（避免 cache 問題）
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      # ✅ 7. 預先 warm cache（降低 Copilot 之後請求）
      - name: Preload common tools
        run: |
          npx --yes typescript --version || true
          npx --yes eslint --version || true

      # ✅ 8. Done marker（讓你 debug）
      - name: Done
        run: echo "Setup completed successfully"