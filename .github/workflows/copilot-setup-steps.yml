name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-24-npm-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24-npm-

      - name: Install JavaScript dependencies
        run: npm install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python-3.11-pip-${{ hashFiles('py_fn/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-3.11-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r py_fn/requirements.txt

      - name: Verify tool installations
        run: |
          node --version
          npm --version
          python --version
          uv --version
          uvx --version

      - name: Smoke test Serena MCP launcher
        shell: bash
        run: |
          set -euo pipefail

          # `start-mcp-server` is long-running; timeout(124) means startup succeeded.
          set +e
          timeout 12s uvx --from git+https://github.com/oraios/serena serena start-mcp-server serena@latest --context ide-assistant --mode autonomous
          exit_code=$?
          set -e

          if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 124 ]; then
            echo "Serena MCP launcher failed with exit code: $exit_code"
            exit "$exit_code"
          fi

          echo "Serena MCP launcher smoke test passed (exit code: $exit_code)."