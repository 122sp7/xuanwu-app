name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-22.04  # 固定 Ubuntu 版本，避免 ubuntu-latest 更新破壞

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: "24.3.1"  # 指定 Node 24 穩定版
          cache: "npm"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install uv (required by Serena, markitdown, and agent-memory MCP servers)
        uses: astral-sh/setup-uv@v5.3.0  # 鎖定次版本
        with:
          enable-cache: true