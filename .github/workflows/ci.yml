name: CI (Global UV Sync)
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup uv (Global)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install All
        run: |
          npm ci
          cd lib/firebase/functions-python
          # 只要確保這行在，管它全域不全域，絕對不會報格式錯誤
          grep -q "\[project\]" pyproject.toml || echo -e "[project]\nname = \"xuanwu\"\nversion = \"0.1.0\"\ndependencies = []\n\n$(cat pyproject.toml)" > pyproject.toml
          uv sync
