name: CI (Zero Red Light Policy)

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Python Dependencies
        # 使用 --frozen 確保 lock 檔沒過期，且指定正確目錄
        run: |
          if [ -d "lib/firebase/functions-python" ]; then
            uv sync --frozen --directory lib/firebase/functions-python
          else
            echo "Error: lib/firebase/functions-python not found!" && exit 1
          fi

      - name: Lint and Test
        run: |
          uv run --directory lib/firebase/functions-python ruff check .
