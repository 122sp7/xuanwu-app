name: CI (Ultra-Stable Auto-Fix)
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Python Dependencies
        working-directory: lib/firebase/functions-python
        run: |
          # 穩健邏輯：如果沒有 lock 檔，就先產生它
          if [ ! -f "uv.lock" ]; then
            echo "uv.lock not found, generating one..."
            uv lock
          fi
          # 執行同步（這時一定會有 lock 檔了）
          uv sync --frozen
