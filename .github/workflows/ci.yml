name: CI (Stable Build)

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Python Dependencies (Stable)
        # 這裡用 --directory 指定路徑，不需要 cd 進去也能跑，更乾淨
        run: uv sync --frozen --directory lib/firebase/functions-python

      - name: Check Python Code (Ruff)
        run: uv run --directory lib/firebase/functions-python ruff check .
