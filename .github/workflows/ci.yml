name: CI (Node + Python uv)
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Node.js 24 設定 ---
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # --- uv 設定 (100% 穩定快取) ---
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          node-version: 24 # 如果你需要 uv 調用特定的 node

      - name: Install Dependencies
        run: |
          npm ci
          uv sync --frozen # 確保環境與 lock 檔完全一致，避免 CI 報錯

      - name: Run Checks
        run: |
          npm test --if-present
          uv run pytest # 使用 uv 跑測試，確保在正確的虛擬環境中
