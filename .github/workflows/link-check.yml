name: Check Broken Links

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/link-check.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/link-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Run broken link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --root-dir "$(pwd)"
            --verbose
            --no-progress
            --exclude-path '.claude/**'
            --exclude-path '.github/skills/**'
            --exclude-path '.serena/**'
            --exclude-path 'docs/templates/**'
            './**/*.md'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: true
          jobSummary: true
