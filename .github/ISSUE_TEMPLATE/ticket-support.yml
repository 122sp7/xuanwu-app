name: Support ticket
description: Capture a support request with tenant context, impact, and urgency.
title: "[Support] "
labels: [support]
body:
  - type: input
    id: requester
    attributes:
      label: Requester
    validations:
      required: true
  - type: input
    id: tenant
    attributes:
      label: Tenant or workspace
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - low
        - medium
        - high
        - critical
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue details
    validations:
      required: true
