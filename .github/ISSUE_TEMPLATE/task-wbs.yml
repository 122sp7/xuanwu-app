name: WBS task
description: Track a delivery slice with dependencies, acceptance, and execution state.
title: "[Task] "
labels: [task]
body:
  - type: input
    id: objective
    attributes:
      label: Objective
      placeholder: What must be finished?
    validations:
      required: true
  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      placeholder: Files, workflows, docs, or behavior changes
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
