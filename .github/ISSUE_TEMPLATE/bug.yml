name: Bug report
description: Report a reproducible defect with affected scope and expected behavior.
title: "[Bug] "
labels: [bug]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: List exact steps and inputs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Affected route or module
      placeholder: app route, module, infrastructure surface, or workflow
