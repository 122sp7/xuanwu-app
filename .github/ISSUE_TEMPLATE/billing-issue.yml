name: Billing issue
description: Capture billing defects or discrepancies with audit and reconciliation context.
title: "[Billing] "
labels: [billing]
body:
  - type: input
    id: account
    attributes:
      label: Account or organization
    validations:
      required: true
  - type: input
    id: cycle
    attributes:
      label: Billing cycle or invoice reference
  - type: textarea
    id: discrepancy
    attributes:
      label: Discrepancy or failure
    validations:
      required: true
  - type: textarea
    id: financial-impact
    attributes:
      label: Financial impact
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or reconciliation evidence
